name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, sqlite3
          tools: composer:v2
      - run: composer install --prefer-dist --no-progress
      - run: php -r "require 'vendor/autoload.php'; \$openapi = \OpenApi\Generator::scan([__DIR__ . '/src']); file_put_contents('openapi.yaml', \$openapi->toYaml());"
      - run: php -l public/index.php
      - run: vendor/bin/phpunit
