# nginx actúa como puente entre Traefik (host network) y el frontend (bridge network)
# Escucha en el puerto 8091 del HOST → reenvía al frontend en su IP fija

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 8091;
    server_name _;

    # Límite de subida de archivos (5MB max)
    client_max_body_size 5M;

    # Habilitar compresión Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;

    location / {
        proxy_pass         http://172.30.0.10;   # IP fija del frontend en app-network
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://172.30.0.10;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
