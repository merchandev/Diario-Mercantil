services:
  backend:
    container_name: dm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - ./backend/storage:/var/www/html/storage
    expose:
      - "9000"
    environment:
      APP_ENV: ${APP_ENV}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_DIR: ${UPLOAD_DIR}
      RESULT_DIR: ${RESULT_DIR}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "php /var/www/html/bin/readiness.php" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    container_name: dm-worker
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: ["php", "/var/www/html/bin/queue-worker.php"]
    volumes:
      - ./backend/storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_DIR: ${UPLOAD_DIR}
      RESULT_DIR: ${RESULT_DIR}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "test $(expr $(date +%s) - $(stat -c %Y /tmp/worker_heartbeat)) -lt 30 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      app-network:
        ipv4_address: 172.30.0.10   # IP fija para que traefik-bridge siempre sepa dónde apuntar

  # ── Puente de red ─────────────────────────────────────────────────────────
  # Traefik corre en "host" network → solo puede descubrir contenedores que
  # comparten esa red. Este nginx mínimo vive en host network, recibe tráfico
  # de Traefik en el puerto 8091 y lo reenvía al frontend via su IP fija.
  traefik-bridge:
    image: nginx:alpine
    network_mode: host
    restart: unless-stopped
    depends_on:
      - frontend
    volumes:
      - ./deploy/nginx-host-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"

      # ── Router HTTPS (websecure) ──────────────────────────────────────────
      # NOTA: www se quitó temporalmente porque www.diariomercantil.com no tiene
      # registro DNS → Let's Encrypt rechaza el cert para AMBOS dominios.
      # Para reactivar www: agrega CNAME www→diariomercantil.com en el panel DNS
      # de Hostinger y luego vuelve a agregar || Host(`www.diariomercantil.com`)
      - "traefik.http.routers.dm.rule=Host(`diariomercantil.com`)"
      - "traefik.http.routers.dm.entrypoints=websecure"
      - "traefik.http.routers.dm.tls=true"
      - "traefik.http.routers.dm.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dm.tls.domains[0].main=diariomercantil.com"

      # ── Servicio: puerto donde escucha ESTE contenedor (host port 8091) ──
      - "traefik.http.services.dm.loadbalancer.server.port=8091"

  db:
    image: mysql:8.0
    container_name: diario-mercantil-db-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 64M
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24   # Subred fija para asignar IPs estáticas
