services:
  backend:
    container_name: dm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - ./backend/storage:/var/www/html/storage
    expose:
      - "9000"
    environment:
      APP_ENV: ${APP_ENV}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_DIR: ${UPLOAD_DIR}
      RESULT_DIR: ${RESULT_DIR}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
      - traefik-proxy
    healthcheck:
      test: [ "CMD-SHELL", "php-fpm -t || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      # Traefik corre en host network → necesita saber qué IP del contenedor usar
      - "traefik.docker.network=traefik-proxy"

      # ── Router HTTPS: ambos dominios en una sola regla ─────────────────
      # El redirect HTTP→HTTPS ya lo maneja el entrypoint global de Traefik
      - "traefik.http.routers.dm.rule=Host(`diariomercantil.com`) || Host(`www.diariomercantil.com`)"
      - "traefik.http.routers.dm.entrypoints=websecure"
      - "traefik.http.routers.dm.tls=true"
      - "traefik.http.routers.dm.tls.certresolver=letsencrypt"

      # ── Servicio: puerto interno nginx ─────────────────────────────────
      - "traefik.http.services.dm.loadbalancer.server.port=80"
    networks:
      - traefik-proxy

  db:
    image: mysql:8.0
    container_name: diario-mercantil-db-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
  traefik-proxy:
    external: true
